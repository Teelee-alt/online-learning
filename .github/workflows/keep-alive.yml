name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 10 * * 1" # Every Monday at 10:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Keep Alive Endpoint
        run: |
          curl -X GET https://yourdomain.com/api/keep-alive \
          -H "x-cron-key: ${{ secrets.CRON_SECRET }}"
